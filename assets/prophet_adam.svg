<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#86efac"/>
  <circle cx="100" cy="100" r="88" fill="#4ade80"/>
  
  <!-- Body / Robe -->
  <ellipse cx="100" cy="175" rx="55" ry="45" fill="#166534"/>
  <rect x="55" y="140" width="90" height="60" rx="10" fill="#166534"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="20" fill="#fbbf24"/>
  
  <!-- Head -->
  <circle cx="100" cy="110" r="38" fill="#fde68a"/>
  
  <!-- Hair (dark) -->
  <ellipse cx="100" cy="76" rx="36" ry="18" fill="#78350f"/>
  <rect x="64" y="76" width="72" height="15" rx="5" fill="#78350f"/>
  
  <!-- Beard -->
  <ellipse cx="100" cy="140" rx="28" ry="18" fill="#92400e"/>
  <rect x="74" y="125" width="52" height="15" rx="5" fill="#92400e"/>
  
  <!-- Eyes -->
  <circle cx="86" cy="108" r="6" fill="white"/>
  <circle cx="114" cy="108" r="6" fill="white"/>
  <circle cx="88" cy="109" r="3.5" fill="#1c1917"/>
  <circle cx="116" cy="109" r="3.5" fill="#1c1917"/>
  <circle cx="89" cy="107" r="1.2" fill="white"/>
  <circle cx="117" cy="107" r="1.2" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M80 101 Q86 97 92 101" stroke="#78350f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108 101 Q114 97 120 101" stroke="#78350f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M87 122 Q100 132 113 122" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="117" rx="4" ry="3" fill="#f59e0b"/>
  
  <!-- Leaf (Adam's fig leaf) -->
  <path d="M55 170 Q35 155 40 135 Q55 125 65 145 Q70 130 80 135 Q75 155 55 170" fill="#16a34a"/>
  <line x1="55" y1="170" x2="60" y2="140" stroke="#15803d" stroke-width="1.5"/>
  
  <!-- Text label -->
  <text x="100" y="210" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#14532d">آدم</text>
</svg>
